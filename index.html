<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WeatherNow</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="overlay"></div>

  <main class="app">
    <section class="header">
      <h1>WeatherNow</h1>
      <p>Get real-time weather updates for any city</p>
    </section>

    <section class="search-box">
      <input id="cityInput" type="text" placeholder="City e.g. Delhi" />
      <input id="countryInput" type="text" placeholder="Country e.g. India" />
      <button id="getWeather">Search</button>
    </section>

    <section id="weatherResult" class="weather-card">
      <p class="empty-text">🌤 Search a city to view weather details</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
